<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatly 🤖</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #f3f4f6;
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 220px;
            background: #1f2937;
            color: #fff;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
        .sidebar h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.3em;
        }
        .history {
            flex: 1;
            overflow-y: auto;
        }
        .chat-link {
            padding: 10px;
            background: #374151;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            display: block;
        }
        .chat-link:hover {
            background: #4b5563;
        }
        .new-chat {
            background: #10b981;
            padding: 10px;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: white;
        }
        .msg {
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            animation: fadeIn 0.3s;
        }
        .user { align-self: flex-end; background: #2563eb; color: white; }
        .bot { align-self: flex-start; background: #e5e7eb; color: black; }
        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
            background: #f9fafb;
        }
        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 1em;
            outline: none;
        }
        .input-area button {
            margin-left: 10px;
            padding: 10px 20px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Chat History</h2>
        <div class="history">
            {% for s in sessions %}
                <a class="chat-link" href="/chat/{{ s[0] }}">{{ s[1] }}</a>
            {% endfor %}
        </div>
        <button class="new-chat" onclick="window.location.href='/new_chat'">+ New Chat</button>
    </div>

    <div class="chat-area">
        <div class="chat-box" id="chat-box">
            {% for chat in chats %}
                <div class="msg user"> {{ chat[0] }}</div>
                <div class="msg bot">{{ chat[1] }}</div>
            {% endfor %}
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter'){sendMessage();}">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");

        function sendMessage() {
            let msg = document.getElementById("user-input").value.trim();
            if (!msg) return;
            addMessage(msg, "user");
            document.getElementById("user-input").value = "";

            fetch("/get", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "msg=" + encodeURIComponent(msg)
            })
            .then(res => res.json())
            .then(data => {
                setTimeout(() => addMessage(data.reply, "bot"), 400);
            });
        }

        function addMessage(text, sender) {
            const div = document.createElement("div");
            div.classList.add("msg", sender);
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
